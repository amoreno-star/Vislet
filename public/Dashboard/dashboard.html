<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vislet Dashboard</title>
    <link rel="icon" type="image/png" href="../Logo/Vislet.png">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>

    <div id="Main">
        
        <!-- Sidebar and Mobile Liquid Bottom Dock Container -->
        <div id="LeftSide" class="sidebar">
            <div class="brand-content">
                <div class="logo-header">
                    <div id="Logo">Vislet</div>
                </div>
                
                <!-- Swipeable Track Component for liquid gesture drag mechanics -->
                <div id="MobileNavWrapper" class="nav-scroll-container">
                    <nav id="NavLinksTrack" class="nav-links">
                        <!-- Points to itself inside the same folder -->
                        <div class="nav-item active" data-url="dashboard.html">
                            <span class="icon">📊</span> 
                            <span class="nav-text">Dashboard</span>
                        </div>
                        <!-- Step out of /dashboard/ folder and into target subdirectory folders -->
                        <div class="nav-item" data-url="../documents/documents.html">
                            <span class="icon">📄</span> 
                            <span class="nav-text">Documents</span>
                        </div>
                        <div class="nav-item" data-url="../payments/payments.html">
                            <span class="icon">💳</span> 
                            <span class="nav-text">Payment</span>
                        </div>
                        <div class="nav-item" data-url="../profile/profile.html">
                            <span class="icon">👤</span> 
                            <span class="nav-text">Profile</span>
                        </div>
                    </nav>
                </div>
            </div>
            <div class="footer">
                &copy; 2026 Vislet. All rights reserved.
            </div>
        </div>

        <!-- Main Workspace Area -->
        <div id="RightSide">
            <div class="window-scroll-wrapper">
                <div class="window-content">
                    
                    <div class="dashboard-header">
                        <h2>Dashboard</h2>
                        <button class="btn-apply">Apply for new visa</button>
                    </div>

                    <div class="section-container">
                        <h3>Completed visas</h3>
                        
                        <div class="visa-card">
                            <div class="visa-details">
                                <h4 class="country-name">Argentina</h4>
                                <p class="visa-type">Student</p>
                                <p class="payment-date">Paid Jul 13, 2026</p>
                            </div>
                            <div class="visa-status">
                                <span class="status-badge-green">Completed</span>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
        
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
